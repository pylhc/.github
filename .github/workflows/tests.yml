name: Reusable Testing

on:
  workflow_call:
    inputs:
      pytest-options:
        required: false 
        type: string
      extra-dependencies:
        required: false 
        type: string
        default: test
      dependency-file:
        required: false 
        type: string
        default: pyproject.toml

defaults:
  run:
    shell: bash

jobs:
  tests: 
    name: ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest, windows-latest]
        # Make sure to escape 3.10 with quotes so it doesn't get interpreted as float 3.1 by GA's parser
        python-version: [3.9, "3.10", 3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - if: matrix.os == 'macos-latest'
        name: Set up hdf5
        run: brew install hdf5

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: '**/${{ inputs.dependency-file }}'
          cache-suffix: py${{ matrix.python-version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: uv pip install '.[${{ inputs.extra-dependencies }}]'

      - name: Run tests
        run: uv python -m pytest ${{ inputs.pytest-options }}
